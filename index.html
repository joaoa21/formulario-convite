<!DOCTYPE html>
<html lang="pt-br">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Convite</title>

  <link rel="stylesheet" href="styles/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>

<body>
  <div id="app">
    <aside>
      <div class="aside-container">
        <header>
          <img src="assets/Logo.png" alt="">
          <span id="logo">Festivite</span>
          <p>Crie um convite digital para o seu evento</p>
        </header>
      </div>
    </aside>

    <main>
      <div class="main-container">
        <h1>Crie seu convite</h1>

        <form action="">
          <fieldset>
            <div class="titulo-field">
              <img src="assets/icones/calendar.png" alt="">
              <legend>Sobre o evento</legend>
            </div>

            <div class="input-wrapper">
              <label for="title">
                Título
              </label>
              <input 
                type="text"
                name="title"
                id="title"
                placeholder="Nome do evento">
            </div>
          </fieldset>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
